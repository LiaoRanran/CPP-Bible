name: CPP-Bible CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  quality:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ['3.11']

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: ${{ matrix.python-version }}

    - name: Preflight (LaTeX 致命反斜杠扫描，错误左移)
      # 纯 Python 零依赖，秒级扫描全书标题/表格/正文里 fenced code 之外的
      # 裸反斜杠序列（如 '\n'），这类字符会让 pdf job 的 xelatex 报
      # "Undefined control sequence" 并整本中断 (exit 43)。放在最快的 quality
      # job 首位，push 后 <10s 即可失败，无需等到耗时的 pdf 阶段才发现。
      run: python3 tools/preflight_check.py
      continue-on-error: false

    - name: Consistency Check
      run: python3 tools/consistency_check.py
      continue-on-error: false

    - name: Cross-Reference Audit
      run: python3 tools/crossref_audit.py
      continue-on-error: false

    - name: Xref Gate (交叉引用完整性 + 孤儿/孤岛)
      # 与 crossref_audit 互补：crossref_audit 看 part 级覆盖度；xref_check
      # 校验全部可导航引用（Markdown [..](..) + ⟶ 箭头式）的目标存在性，
      # 断裂链接 (指向不存在的 .md) 即 BLOCK（退出码 1，本 job 失败），
      # 孤儿章(零入链)/信息孤岛(零出链) 仅 WARN 不阻断。
      run: python3 tools/xref_check.py
      continue-on-error: false

    - name: Index Freshness (SUMMARY/GLOSSARY/PREREQUISITES 与章节同步)
      # 三份索引由 gen_indexes.py 从文件系统确定性生成。若有人改了章标题/
      # 前置元数据/增删章却忘记重跑生成器，--check 会发现磁盘与生成结果不一致
      # 并 BLOCK，提示重跑 `python3 tools/gen_indexes.py`。
      run: python3 tools/gen_indexes.py --check
      continue-on-error: false

    - name: Ensure binutils (c++filt/objdump)
      # 书内 asm 围栏审计依赖 binutils 的 c++filt/objdump 解析 _asm_demo 工件
      # （MinGW-w64 GCC15.3.0 产物，Linux binutils 可跨格式解析）。ubuntu-latest
      # 默认预装 binutils；此处仅作防御性兜底。
      run: command -v c++filt && command -v objdump || sudo apt-get install -y binutils

    - name: Book ASM Freshness (书内 asm 围栏 vs 工件符号一致性)
      # 与 consistency/compile 门禁并列：验证书内 asm 围栏展示的「用户 demo 函数」
      # 仍定义于对应 GCC15.3.0 工件（_asm_demo/）。若某 demo 函数已不在工件定义中
      # （版本漂移 / 复制错贴），判为真过期并 BLOCK 本 job，阻断发布。
      # 工件为符号层面比对，不重编译，纯 Python + binutils，秒级完成。
      run: python3 tools/book_asm_freshness.py
      continue-on-error: false

  compile:
    needs: quality
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        gcc: ['15']

    steps:
    - uses: actions/checkout@v4

    - name: Install GCC
      run: |
        sudo apt-get update
        # ubuntu-latest (24.04) 默认源没有 gcc-15；apt 的包名替代机制会把 g++-15
        # 解析成 clang-15 等错误包，导致 /usr/bin/g++-15 不存在。直接通过 PPA 安装
        # 确保拿到真正的 gcc-15/g++-15。
        sudo apt-get install -y software-properties-common
        sudo add-apt-repository -y ppa:ubuntu-toolchain-r/test
        sudo apt-get update
        sudo apt-get install -y gcc-${{ matrix.gcc }} g++-${{ matrix.gcc }}
        test -f /usr/bin/g++-${{ matrix.gcc }}
        sudo update-alternatives --install /usr/bin/g++ g++ /usr/bin/g++-${{ matrix.gcc }} 100

    - name: Compile Audit (全量隔离块语法检查)
      # --main-only 仅验证含 int main 的完整程序；设计性豁免（多文件工程/
      # 模块/MSVC/POSIX 专属/外部库/故意错误·UB/跨块增量）由 compile_gate
      # 依据 tools/compile_exempt.json 放行，避免误伤。
      run: python3 tools/compile_all.py --main-only

    - name: Compile Gate (防回归门禁)
      # 未来任何编辑若引入新的 SYNTAX/TYPE_MISMATCH 内容 bug，CI 立即变红；
      # 已知豁免不阻断。门禁失败则本 job 失败，阻断后续发布任务。
      continue-on-error: false
      run: python3 tools/compile_gate.py

  # ---- 发布：静态站点（MkDocs Material）----
  site:
    needs: quality
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Install MkDocs stack
      run: pip install mkdocs-material mkdocs-mermaid2-plugin

    - name: Rewrite cross-chapter links (site)
      run: python3 tools/rewrite_links.py --mode site

    - name: Generate nav & config
      run: python3 tools/gen_mkdocs_nav.py

    - name: Build site
      run: mkdocs build --strict --config-file build/site/mkdocs.yml

    - name: Index full-text search (PageFind, CJK)
      # PageFind extended 二进制原生支持中日文分词；对 build/site_out 静态产物建索引，
      # 生成 build/site_out/pagefind/（含 pagefind-ui.js / pagefind-ui.css）。
      run: |
        pip install 'pagefind[extended]'
        python3 -m pagefind --site build/site_out

    - name: Upload site artifact
      uses: actions/upload-artifact@v4
      with:
        name: cpp-bible-site
        path: build/site_out
        retention-days: 14

    - name: Upload Pages artifact
      uses: actions/upload-pages-artifact@v3
      with:
        path: build/site_out

  # ---- 发布：全书 PDF（pandoc + xelatex + mermaid）----
  pdf:
    needs: quality
    runs-on: ubuntu-latest
    env:
      # GitHub Actions Linux runner 以 root 运行且无可用的 Chromium sandbox，
      # mermaid-filter 1.4.x 调 mermaid-cli(mmdc) 渲染 Mermaid 图会因 Chromium
      # 启动失败而 FATAL 退出（exit 83）。mermaid-filter 只认
      # MERMAID_FILTER_PUPPETEER_CONFIG 指向的 puppeteer 配置文件，把
      # --no-sandbox 写进该 JSON 的 args，再由 mmdc -p 透传给 puppeteer.launch()。
      # （注意：PUPPETEER_ARGS 在本版本不生效，必须用配置文件方式。）
      MERMAID_FILTER_PUPPETEER_CONFIG: ${{ github.workspace }}/.puppeteer.json
    steps:
    - uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Install pandoc / xelatex / CJK fonts
      run: |
        sudo apt-get update
        sudo apt-get install -y pandoc texlive-xetex texlive-lang-chinese fonts-noto-cjk fonts-noto-cjk-extra

    - name: Install mermaid-filter
      run: npm install -g mermaid-filter

    - name: Build PDF (by-part 分卷，避免 xelatex 超时)
      run: bash tools/generate_pdf.sh --by-part

    - name: Upload PDF artifact
      uses: actions/upload-artifact@v4
      with:
        name: cpp-bible-pdf
        path: build/pdf/part*.pdf
        retention-days: 14

  # ---- 发布：全书 EPUB（pandoc epub3）----
  epub:
    needs: quality
    runs-on: ubuntu-latest
    env:
      # 复用 pdf job 的 puppeteer 配置，让 mermaid-filter 在 CI 无沙箱环境渲染 Mermaid 为 SVG 嵌入 EPUB
      MERMAID_FILTER_PUPPETEER_CONFIG: ${{ github.workspace }}/.puppeteer.json
    steps:
    - uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Install pandoc
      run: sudo apt-get update && sudo apt-get install -y pandoc

    - name: Install mermaid-filter
      run: npm install -g mermaid-filter

    - name: Generate EPUB
      run: bash tools/generate_epub.sh

    - name: Upload EPUB artifact
      uses: actions/upload-artifact@v4
      with:
        name: cpp-bible-epub
        path: build/epub/*.epub
        retention-days: 14

  # ---- 发布：GitHub Pages 部署（site + PageFind 索引）----
  deploy:
    needs: site
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
    - name: Deploy to GitHub Pages
      id: deployment
      uses: actions/deploy-pages@v4
